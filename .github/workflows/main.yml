# =================================================================
# [팀 프로젝트 필수 규칙]
# 1. 메인 방(main 브랜치)에 직접 코드 파일을 올리지 마세요!
# 2. 작업할 때는 반드시 'dev-내이름'으로 내 방을 만들어서 합니다.
# 3. 내 방에서 코딩이 끝나면 메인 방으로 '합쳐달라고 요청(PR)' 합니다.
# 4. 요청을 보내면 컴퓨터가 자동으로 오타나 문법 에러를 검사합니다.
# 5. 검사(✔)가 통과하고 팀원이 승인해야 최종적으로 코드가 합쳐질 예정입니다.
# =================================================================

name: 팀플용 코드 오타 자동 검증기

# 1. 언제 실행할 것인가? (실행 타이밍 설정)
on:
  push:
    branches: [ "main" ]
    # 자원 아끼기: 소스 코드가 바뀔 때만 실행합니다.
    paths:
      - 'src/**'        # src 폴더 안의 파일이 바뀌거나
      - '**.py'         # 모든 파이썬(.py) 파일이 바뀔 때만 작동함
      - '!readme.md'    # 단순 안내문(readme.md)만 고친 거라면 작동 안 함

  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - '**.py'
      - '!readme.md'

# 2. 컴퓨터가 순서대로 할 일들
jobs:
  build-and-test:
    runs-on: ubuntu-latest  # 깨끗한 가상 리눅스 컴퓨터 한 대 빌리기

    steps:
      # [1단계] 팀원이 올린 소스 코드를 가상 컴퓨터로 다운로드하기
      - name: 코드 가져오기
        uses: actions/checkout@v4

      # [2단계] 파이썬을 쓸 수 있도록 기본 환경 세팅하기
      - name: 파이썬 컴퓨터 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # [3단계] 코드 오타를 잡아줄 검사 도구(flake8) 설치하기
      - name: 문법 검사 프로그램 설치
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # [4단계] 팀원들의 코드에 치명적인 문법 에러나 괄호 오타가 없는지 최종 검사하기
      - name: 코드 오타 및 문법 에러 실시간 스캔
        run: |
          # 코드에 들여쓰기 에러나 작동 불가능한 문법 오류가 발견되면 
          # 가상 컴퓨터가 빌드를 터트려서(Fail) 메인 방에 꼬인 코드가 합쳐지는 걸 막아줍니다.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
