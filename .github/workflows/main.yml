# =================================================================
# [팀 프로젝트 필수 규칙 & 개발 환경 가이드]
#
# [1] 기술 환경 및 버전 규격
#  - 언어 및 버전: Python 3.10 이상 사용 필수
#  - 패키지 관리: 추가 라이브러리 사용 시 requirements.txt에 기록할 것
#
# [2] 폴더 구조 및 파일 이름 규칙
#  - 모든 실행 소스 코드는 반드시 'src/' 폴더 내부에 작성해야 합니다.
#  - 파이썬 파일 확장자는 반드시 '.py'로 통일해야 자동 검증이 돌아갑니다.
#  - 단순 안내 및 문서 수정은 'readme.md' 파일만 수정하여 커밋하세요.
#
# [3] 브랜치 운영 약속
#  1. 메인 방(main 브랜치)에 직접 코드 파일을 push하지 마세요!
#  2. 작업할 때는 반드시 'dev-내이름'으로 개인 브랜치를 만들어 작업하세요.
#  3. 코딩 완료 후 main으로 'Pull Request(PR)'를 날려 합류를 요청하세요.
#  4. PR이 생성되면 시스템이 자동으로 코드 오타와 문법을 검사합니다.
#  5. 검사를 통과하고 팀원의 승인을 받아야 최종 병합됩니다.
# =================================================================

name: 팀플용 코드 오타 자동 검증기

# 1. 언제 실행할 것인가? (실행 타이밍 설정)
on:
  push:
    branches: [ "main" ]
    # 자원 아끼기: 공지된 파일 규칙(src 폴더, .py 파일)이 바뀔 때만 실행
    paths:
      - 'src/**'        # src 폴더 안의 파일이 바뀌거나
      - '**.py'         # 모든 파이썬(.py) 파일이 바뀔 때만 작동함
      - '!readme.md'    # 단순 안내문(readme.md)만 고친 거라면 작동 안 함

  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - '**.py'
      - '!readme.md'

# 2. 컴퓨터가 순서대로 할 일들
jobs:
  build-and-test:
    runs-on: ubuntu-latest  # 깨끗한 가상 리눅스 컴퓨터 한 대 빌리기

    steps:
      # [1단계] 팀원이 올린 소스 코드를 가상 컴퓨터로 다운로드하기
      - name: 코드 가져오기
        uses: actions/checkout@v4

      # [2단계] 위 공지사항에 명시한 파이썬 3.10 환경 세팅하기
      - name: 파이썬 컴퓨터 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # [3단계] 코드 오타를 잡아줄 검사 도구(flake8) 설치하기
      - name: 문법 검사 프로그램 설치
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      # [4단계] 팀원들의 코드에 치명적인 문법 에러나 괄호 오타가 없는지 최종 검사하기
      - name: 코드 오타 및 문법 에러 실시간 스캔
        run: |
          # 코드에 들여쓰기 에러나 작동 불가능한 문법 오류가 발견되면
          # 가상 컴퓨터가 빌드를 터트려서(Fail) 메인 방에 꼬인 코드가 합쳐지는 걸 막아줍니다.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
